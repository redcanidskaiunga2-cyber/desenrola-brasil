<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desenrola Brasil 2026 - Renegocie com até 90% de Desconto</title>
  <meta name="description" content="Renegocie suas dívidas com até 90% de desconto no Novo Desenrola Brasil. Preencha seus dados e simule agora.">
  
  <style>
    :root {
      --blue: #003087;
      --green: #00A84F;
      --dark: #001f5c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      color: #333;
    }

    /* Hero */
    .hero {
      background: linear-gradient(rgba(0, 48, 135, 0.85), rgba(0, 31, 92, 0.9)), 
                  url('https://images.unsplash.com/photo-1554224155-6726b9b5d8b3?w=1600') center/cover;
      color: white;
      text-align: center;
      padding: 220px 20px 120px;
    }
    .hero h1 {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 1.4rem;
      max-width: 700px;
      margin: 0 auto 30px;
    }

    .btn {
      background: var(--green);
      color: white;
      padding: 16px 40px;
      font-size: 1.25rem;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover {
      transform: scale(1.08);
      background: #008f42;
    }

    section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
    .form-section {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    }
    .form-section h2 {
      text-align: center;
      color: var(--blue);
      margin-bottom: 40px;
      font-size: 2.4rem;
    }

    form { max-width: 700px; margin: 0 auto; display: grid; gap: 20px; }
    label { font-weight: 600; margin-bottom: 6px; display: block; color: #222; }
    input, select {
      width: 100%;
      padding: 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1.1rem;
    }
    input:focus, select:focus {
      border-color: var(--green);
      outline: none;
    }

    /* Botão Flutuante WhatsApp */
    .whatsapp-float {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #25D366;
      color: white;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 1000;
      transition: 0.3s;
    }
    .whatsapp-float:hover {
      transform: scale(1.15);
    }

    footer {
      background: var(--dark);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>Novo Desenrola Brasil 2026</h1>
    <p><strong>Descontos de até 90%</strong> • Juros baixos • Até 48x para pagar</p>
    <a href="#preencher" class="btn">SIMULAR MINHA RENEGOCIAÇÃO AGORA</a>
  </section>

  <section id="preencher" class="form-section">
    <h2>Preencha seus dados para simular</h2>
    
    <form id="formDesenrola" action="https://formspree.io/f/xgoqqvey" method="POST">
      <div>
        <label>Nome completo</label>
        <input type="text" name="nome" placeholder="Digite seu nome completo" required>
      </div>
      <div>
        <label>CPF</label>
        <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" required>
      </div>
      <div>
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seuemail@email.com" required>
      </div>
      <div>
        <label>Telefone (WhatsApp)</label>
        <input type="tel" name="telefone" placeholder="(11) 99999-9999" required>
      </div>
      <div>
        <label>Valor aproximado da dívida (R$)</label>
        <input type="number" name="valor_divida" placeholder="8500" required>
      </div>
      <div>
        <label>Tipo de dívida</label>
        <select name="tipo_divida" required>
          <option value="">Selecione</option>
          <option value="Cartão de Crédito">Cartão de Crédito</option>
          <option value="CDC / Empréstimo">CDC / Empréstimo</option>
          <option value="Cheque Especial">Cheque Especial</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <button type="submit" class="btn" style="width:100%; margin-top: 10px;">ENVIAR DADOS E SIMULAR</button>
    </form>
  </section>

  <!-- Botão Flutuante WhatsApp -->
  <a href="https://wa.me/55SEUNUMEROAQUI" target="_blank" class="whatsapp-float">
    💬
  </a>

  <footer>
    <p><strong>Desenrola Brasil 2026</strong> — Simulador demonstrativo</p>
    <p style="margin-top: 10px; font-size: 0.9rem;">
      Este é um site demonstrativo. O programa oficial é do Governo Federal.
    </p>
  </footer>

  <script>
    // Máscara CPF
    document.getElementById('cpf').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      e.target.value = v;
    });

    // Mensagem de sucesso
    document.getElementById('formDesenrola').addEventListener('submit', function() {
      setTimeout(() => {
        alert('✅ Dados enviados com sucesso!\nEm breve entraremos em contato pelo WhatsApp.');
      }, 800);
    });
  </script>
</body>
</html>
